services:
  admin:
    container_name: skillflow-admin

    build:
      context: .
      dockerfile: Dockerfile

    image: skillflow-admin:latest

    restart: unless-stopped

    ports:
      - "127.0.0.1:3001:80"

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"