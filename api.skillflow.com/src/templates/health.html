<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{service}} Health</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f8fb;
        --panel: #ffffff;
        --text: #17202a;
        --muted: #5f6b7a;
        --border: #d9e1ea;
        --ok: #138a5b;
        --ok-bg: #e8f7ef;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      main {
        width: min(680px, 100%);
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 28px;
        box-shadow: 0 16px 40px rgba(23, 32, 42, 0.08);
      }

      header {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: flex-start;
        border-bottom: 1px solid var(--border);
        padding-bottom: 20px;
        margin-bottom: 20px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 28px;
        line-height: 1.15;
        font-weight: 700;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.5;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        flex: 0 0 auto;
        border-radius: 999px;
        padding: 8px 12px;
        color: var(--ok);
        background: var(--ok-bg);
        font-size: 14px;
        font-weight: 700;
        text-transform: uppercase;
      }

      .dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: var(--ok);
      }

      dl {
        display: grid;
        grid-template-columns: minmax(120px, 0.38fr) 1fr;
        gap: 14px 20px;
        margin: 0;
      }

      dt {
        color: var(--muted);
        font-size: 14px;
      }

      dd {
        margin: 0;
        font-weight: 650;
        overflow-wrap: anywhere;
      }

      code {
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-size: 0.95em;
      }

      @media (max-width: 560px) {
        main {
          padding: 22px;
        }

        header {
          display: block;
        }

        .status {
          margin-top: 16px;
        }

        dl {
          grid-template-columns: 1fr;
          gap: 6px;
        }

        dd {
          margin-bottom: 12px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>{{service}} Health</h1>
          <p>Current server health and runtime status.</p>
        </div>
        <span class="status"><span class="dot"></span>{{status}}</span>
      </header>

      <dl>
        <dt>Service</dt>
        <dd><code>{{service}}</code></dd>

        <dt>Status</dt>
        <dd>{{status}}</dd>

        <dt>Uptime</dt>
        <dd>{{uptime}}</dd>

        <dt>Timestamp</dt>
        <dd>{{timestamp}}</dd>
      </dl>
    </main>
  </body>
</html>
