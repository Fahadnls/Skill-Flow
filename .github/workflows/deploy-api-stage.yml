name: Deploy API Staging
on:
  push:
    branches:
      - api-stage-delpoy
    paths:
      - "api.skillflow.com/**"
      - ".github/workflows/deploy-api-stage.yml"

  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Staging API
    runs-on: ubuntu-latest
    steps:
      ##########################################################################
      # Checkout Repository
      ##########################################################################

      - name: Checkout Repository
        uses: actions/checkout@v4

      ##########################################################################
      # Copy Project to EC2
      ##########################################################################

      - name: Copy API Project
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          source: "api.skillflow.com/*"
          target: "/opt/apps/staging/api"

          overwrite: true

      ##########################################################################
      # Deploy
      ##########################################################################

      - name: Deploy API
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            set -e

            ####################################################################
            # Variables
            ####################################################################

            APP_DIR="/opt/apps/staging/api/api.skillflow.com"
            COMPOSE_FILE="docker-compose.stage.yml"
            PROJECT_NAME="skillflow-api-prod"
            SERVICE_NAME="api"

            ####################################################################
            # Project
            ####################################################################

            echo ""
            echo "========== PROJECT =========="
            echo "Directory : $APP_DIR"
            echo "Compose   : $COMPOSE_FILE"
            echo "Project   : $PROJECT_NAME"
            echo "Service   : $SERVICE_NAME"

            cd "$APP_DIR"

            ####################################################################
            # Validate
            ####################################################################

            echo ""
            echo "========== VALIDATE =========="

            pwd
            ls -la

            docker compose \
              -p "$PROJECT_NAME" \
              -f "$COMPOSE_FILE" \
              config

            ####################################################################
            # Build
            ####################################################################

            echo ""
            echo "========== BUILD =========="

            docker compose \
              -p "$PROJECT_NAME" \
              -f "$COMPOSE_FILE" \
              build

            ####################################################################
            # Deploy
            ####################################################################

            echo ""
            echo "========== DEPLOY =========="

            docker compose \
              -p "$PROJECT_NAME" \
              -f "$COMPOSE_FILE" \
              up -d \
              --build \
              --no-deps \
              "$SERVICE_NAME"

            ####################################################################
            # Status
            ####################################################################

            echo ""
            echo "========== STATUS =========="

            docker compose \
              -p "$PROJECT_NAME" \
              -f "$COMPOSE_FILE" \
              ps

            docker ps

            ####################################################################
            # Cleanup
            ####################################################################

            echo ""
            echo "========== CLEANUP =========="

            docker image prune -f

            echo ""
            echo "========== DEPLOYMENT COMPLETED =========="
            
